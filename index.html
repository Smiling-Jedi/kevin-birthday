<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevin 杨乐其</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #FDF8F3;
      color: #3D3D3D;
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 1.2s ease-out;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    h1 .english {
      font-family: 'Caveat', cursive;
      font-size: 3.2rem;
      font-weight: 400;
      color: #5B8DB8;
      display: block;
      margin-bottom: 4px;
    }

    .date {
      font-size: 0.95rem;
      color: #888;
      letter-spacing: 3px;
      margin-bottom: 36px;
      font-variant-numeric: tabular-nums;
    }

    .date span {
      margin: 0 8px;
      color: #E89B6C;
    }

    .photos {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 36px;
    }

    .photo {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    .photo:nth-child(1) { animation-delay: 0.2s; }
    .photo:nth-child(2) { animation-delay: 0.4s; }
    .photo:nth-child(3) { animation-delay: 0.6s; }
    .photo:nth-child(4) { animation-delay: 0.8s; }
    .photo:nth-child(5) { animation-delay: 1.0s; }

    .photo:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .message {
      font-family: 'Caveat', cursive;
      font-size: 2.6rem;
      color: #5B8DB8;
      line-height: 1.4;
      font-style: italic;
      margin-bottom: 24px;
    }

    .birthday {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      color: #E89B6C;
      margin-top: 32px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #E89B6C;
      margin: 0 auto;
      border-radius: 1px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.2rem; }
      h1 .english { font-size: 2.6rem; }
      .message { font-size: 2.2rem; }
      .birthday { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span class="english">Kevin</span>
      杨乐其
    </h1>
    <p class="date">2009.04.02 <span>·</span> 19:50</p>

    <p class="message">kevin, be yourself with joy &amp; happiess!</p>
    <div class="divider"></div>

    <div class="photos">
      <img src="kevin-birthday/kevin-01.jpg" alt="刚出生 5 分钟" class="photo">
      <img src="kevin-birthday/kevin-02.jpg" alt="小时候" class="photo">
      <img src="kevin-birthday/kevin-06.jpg" alt="户外时光" class="photo">
      <img src="kevin-birthday/kevin-07.jpg" alt="篮球少年" class="photo">
      <img src="kevin-birthday/kevin-03.jpg" alt="全家福" class="photo">
    </div>

    <p class="birthday">Happy Birthday!</p>
  </div>
</body>
</html>
